---


  # HINT: Possible approach: Check available version before
- name: Get fuse-overlayfs version available from apt cache
  become: true
  shell: apt-cache policy fuse-overlayfs | grep andidat | grep -Eo '[^[:blank:]]+$' | grep -Eo '^[^-]+' | cat
  register: fuseOverlayFsAvailableVersionShellResult
  changed_when: fuseOverlayFsAvailableVersionShellResult.rc == 0

- name: Install latest static version of fuse-overlayfs executable
  when: >
    fuseOverlayFsAvailableVersionShellResult.stdout|regex_search('[0-9]+(?:\.[0-9]+){1,2}') == none
    or fuseOverlayFsAvailableVersionShellResult.stdout is version('1.0.0','<')
  block:

      # Latest version result: fuseOverlayFsSourceGithubResult.recommended_version
    - name: Determine fuse-overlayfs latest release version
      maveno_source_github:
        owner: containers
        repo: fuse-overlayfs
      environment:
        SSL_CERT_DIR: /etc/ssl/certs
        REQUESTS_CA_BUNDLE: "{{ mavenoSystemCaCertificatesFilePath }}"
      register: fuseOverlayFsSourceGithubResult

      # RESULT: fuseOverlayFsVersionShellResult.stdout
    - name: Determine fuse-overlayfs installed version
      shell: /usr/bin/fuse-overlayfs -V | grep version | awk '{print $3}'
      args:
        executable: /bin/bash
      register: fuseOverlayFsVersionShellResult
      changed_when: fuseOverlayFsVersionShellResult.rc == 0

    - name: Download and install latest static version of fuse-overlayfs executable
      when: fuseOverlayFsSourceGithubResult.recommended_version != fuseOverlayFsVersionShellResult.stdout
      become: true
      get_url:
        url: >-
          https://github.com/containers/fuse-overlayfs/releases/download/v{{
          fuseOverlayFsSourceGithubResult.recommended_version }}/fuse-overlayfs-{{
          fuseOverlayFsArchitectureLookupTable[osgwSystemArchitecture] }}
        dest: /usr/bin/
        owner: root
        group: root
        mode: 0755
      environment:
        SSL_CERT_DIR: /etc/ssl/certs
      register: getUrlResult
      until: getUrlResult is success
      retries: 10
      delay: 30

    - name: Rename fuse-overlayfs executable
      when: fuseOverlayFsSourceGithubResult.recommended_version != fuseOverlayFsVersionShellResult.stdout
      become: true
      command: mv \"{{ getUrlResult.dest }}\" /usr/bin/fuse-overlayfs
      register: renamefuseOverlayFsExecutableCommandResult
      changed_when: renamefuseOverlayFsExecutableCommandResult.rc == 0


- name: Install latest static vesion of fuse-overlayfs
  when:
    - fuseOverlayFsAvailableVersionShellResult.stdout|regex_search('[0-9]+(?:\.[0-9]+){1,2}') != none
    - fuseOverlayFsAvailableVersionShellResult.stdout is version('1.0.0','>=')
  block:

    - name: Store location of current python venv
      set_fact:
        tempPythonInterpreter: "{{ ansible_python_interpreter }}"
    - name: Switch temporarily to system python
      set_fact:
        ansible_python_interpreter: "{{ mavenoSystemPythonInterpreter }}"
    # ###

    - name: Install latest version of fuse-overlayfs as apt package
      become: true
      apt:
        pkg: fuse-overlayfs
        cache_valid_time: 10800

    # ###
    - name: Switch back to framework python venv
      set_fact:
        ansible_python_interpreter: "{{ tempPythonInterpreter }}"


...
